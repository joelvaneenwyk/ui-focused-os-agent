# https://taskfile.dev

version: '3'

env:
  CONTROL_BACKEND: uia

tasks:
  default:
    cmds:
      - cmd: |
          if ! uv venv --allow-existing; then
            rm -rf .venv
            uv venv
          fi
      - cmd: |
          uv sync --locked
      - cmd: |
          xcopy /-I /Y \
              "{{ joinPath .TASKFILE_DIR "ufo/config/config.yaml.template" }}" \
              "{{ joinPath .TASKFILE_DIR "ufo/config/config.yaml" }}"
      - cmd: |
          uv run --no-sync ufo
